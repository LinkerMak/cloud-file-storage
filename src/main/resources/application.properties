spring.application.name=cloud-file-storage

server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5432/cloud_storage
spring.datasource.username=cloud_user
spring.datasource.password=cloud_pass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.redis.session.ttl-seconds = 1800
spring.redis.session.ttl-refresh-threshold-seconds = 300
spring.redis.session.session-cookie-name = SESSION_ID

spring.minio.url = http://localhost:9000
spring.minio.access-key = minioadmin
spring.minio.secret-key = minioadmin
spring.minio.bucket = user-files

spring.servlet.multipart.max-file-size = 100MB
spring.servlet.multipart.max-request-size = 120MB